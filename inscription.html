<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - KimCV</title>
<link rel="stylesheet" href="inscription.css">
<style>



</style>
</head>
<body>

<div class="card">

    <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="-1 -1 22 20">
	        <path d="M-1 -1h22v22H-1z" fill="none" />
	        <g fill="#1a3a6b">
		    <path d="M7.8 6.35c.56 0 1.01-.45 1.01-1.01S8.36 4.33 7.8 4.33s-1.01.45-1.01 1.01s.45 1.01 1.01 1.01" />
		    <path fill-rule="evenodd" d="M9.83 8.55c0-1.08-.91-1.86-2.03-1.86s-2.03.78-2.03 1.86v.51c0 .09.04.18.1.24s.15.1.24.1h3.38c.09 0 .18-.04.24-.1s.1-.15.1-.24zM5.75 11.5a.75.75 0 0 1 .75-.75h7a.75.75 0 0 1 0 1.5h-7a.75.75 0 0 1-.75-.75m0 3a.75.75 0 0 1 .75-.75h7a.75.75 0 0 1 0 1.5h-7a.75.75 0 0 1-.75-.75" clip-rule="evenodd" />
		    <path fill-rule="evenodd" d="M2.5 2.5c0-1.102.898-2 2-2h6.69c.562 0 1.092.238 1.465.631l.006.007l4.312 4.702c.359.383.527.884.527 1.36v10.3c0 1.102-.898 2-2 2h-11c-1.102 0-2-.898-2-2zm8.689 0H4.5v15h11V7.192l-4.296-4.685l-.003-.001z" clip-rule="evenodd" />
		    <path fill-rule="evenodd" d="M11.19.5a1 1 0 0 1 1 1v4.7h4.31a1 1 0 1 1 0 2h-5.31a1 1 0 0 1-1-1V1.5a1 1 0 0 1 1-1" clip-rule="evenodd" />
	        </g>
        </svg>
    </div>

    <h1>Créer un compte</h1>

    <p class="subtitle">
        Rejoignez KimCV gratuitement
    </p>

    <div id="message"></div>

    <form id="registerForm">

        <div class="row">

            <div class="input-group">
                <label>Prénom</label>
                <input
                    type="text"
                    id="firstName"
                    required
                >
            </div>

            <div class="input-group">
                <label>Nom</label>
                <input
                    type="text"
                    id="lastName"
                    required
                >
            </div>

        </div>

        <div class="input-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                required
            >
        </div>

        <div class="input-group">
            <label>Mot de passe</label>
            <input
                type="password"
                id="password"
                required
            >
        </div>

        <div class="input-group">
            <label>Confirmer le mot de passe</label>
            <input
                type="password"
                id="confirmPassword"
                required
            >
        </div>

        <div class="checkbox">
            <input
                type="checkbox"
                id="terms"
                required
            >

            <label for="terms">
                J'accepte les conditions
            </label>
        </div>

        <button type="submit">
            Créer mon compte
        </button>

    </form>

    <div class="footer">
        Déjà inscrit ?
        <a href="#">
            Se connecter
        </a>
    </div>

</div>



</body>
</html>
