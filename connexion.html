<span class="serif" style="font-size:36px;font-weight:00;color:#1A3A6B;"></span>

  </div>

  <h1 class="auth-card-title serif">Connexion</h1>

  <p class="auth-card-subtitle" style="color:#1a3a6b9e;">
    Connectez-vous à votre espace KimCV
  </p>

  <form id="loginForm">

    <div class="auth-input-group" style="margin-bottom: 15px;">
      <label class="auth-label" style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#1A3A6B;">Email</label>
      <input type="email" id="email" class="auth-input-field" placeholder="email@example.com" required>
    </div>

    <div class="auth-input-group" style="margin-bottom: 15px;">
      <label class="auth-label" style="display:block; margin-bottom:6px; font-size:14px; font-weight:600; color:#1A3A6B;">Mot de passe</label>
      <div class="auth-password-row">
        <input type="password" id="password" class="auth-input-field" placeholder="********" required>
        <button type="button" class="auth-btn-eye" id="togglePassword">👁</button>
      </div>
    </div>

    <div class="auth-meta-options">
      <label>
        <input type="checkbox" id="remember">
        Se souvenir de moi
      </label>
      <a href="#">Mot de passe oublié ?</a>
    </div>

    <button type="submit" class="auth-btn-submit-primary">
      Se connecter
    </button>

  </form>

  <div class="auth-social-container">
    <button type="button">Se connecter avec Google 
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 16 16">

		    <path fill="#448aff" d="M12.685 13.29a26 26 0 0 0-2.202-1.74q1.15-.812 1.396-2.228H8.122V6.713q3.25-.027 6.497.055q.616 3.345-1.423 6.032a7 7 0 0 1-.51.49" opacity="0.999" />
		    <path fill="#43a047" d="M4.255 9.322q1.23 3.057 4.51 2.854a3.94 3.94 0 0 0 1.718-.626q1.148.812 2.202 1.74a6.62 6.62 0 0 1-4.027 1.684a6.4 6.4 0 0 1-1.02 0Q3.82 14.524 2 11.116z" opacity="0.993" />
	      </g>
      </svg>

      </span>
    </button>
    <button type="button">GitHub 
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
	<path d="M0 0h24v24H0z" fill="none" />

</svg>

  </button>
  </div>

  <div class="auth-card-footer">
    Pas encore de compte ?
    <a href="#">Créer un compte</a>
  </div>

</div>

<div id="page-connexion">
    <h2>Connexion</h2>
    <form id="form-login">
        <input type="email" placeholder="Email" required>
        <button type="submit">Se connecter</button>
    </form>
    <p>Pas de compte ? <button onclick="chargerPage('inscription.html')">S'inscrire</button></p>
</div>
